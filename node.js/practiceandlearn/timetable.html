<!DOCTYPE html>
<html>
<head>
    <title>Class Timetable</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }

        .lab {
            background-color: #d6f5d6;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Class Timetable (With Labs)</h1>

<table>
    <tr>
        <th>Day</th>
        <th>9:00 - 10:00</th>
        <th>10:00 - 11:00</th>
        <th>11:00 - 12:00</th>
        <th>12:00 - 1:00</th>
        <th>1:00 - 2:00</th>
        <th>2:00 - 3:00</th>
    </tr>

    <tr>
        <td>Monday</td>
        <td>OS</td>
        <td>DAA</td>
        <td>Mathematics-3</td>
        <td rowspan="5"><b>LUNCH</b></td>
        <td>SE</td>
        <td>VAC</td>
    </tr>

    <tr>
        <td>Tuesday</td>
        <td colspan="3" class="lab">OS LAB</td>
        <td>Mathematics-3</td>
        <td>SE</td>
    </tr>

    <tr>
        <td>Wednesday</td>
        <td>DAA</td>
        <td>OS</td>
        <td>SE</td>
        <td>VAC</td>
        <td>Mathematics-3</td>
    </tr>

    <tr>
        <td>Thursday</td>
        <td colspan="3" class="lab">FSD LAB</td>
        <td>OS</td>
        <td>DAA</td>
    </tr>

    <tr>
        <td>Friday</td>
        <td>Mathematics-3</td>
        <td>SE</td>
        <td>VAC</td>
        <td colspan="2" class="lab">DAA LAB</td>
    </tr>

</table>

</body>
</html>
